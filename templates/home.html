<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="container">
    <h1>Enter Laptop Details</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <div class="form-group">
            <label>Company</label>
            <input type="text" name="company" required>
        </div>

        <div class="form-group">
            <label>Type</label>
            <input type="text" name="typename" required>
        </div>

        

        <div class="form-group">
            <label>Screen Size (inches)</label>
            <input type="number" step="any" name="inches" required>
        </div>

        <div class="form-group">
            <label>CPU</label>
            <input type="text" name="cpu" required>
        </div>

        <div class="form-group">
            <label>Memory</label>
            <input type="text" name="memory" required>
        </div>

        <div class="form-group">
            <label>Screen Height</label>
            <input type="number" name="screen_height" required>
        </div>

        <div class="form-group">
            <label>Screen Width</label>
            <input type="number" name="screen_width" required>
        </div>

        <div class="form-group">
            <label>Operating System</label>
            <input type="text" name="opsys" required>
        </div>

        <div class="form-group">
            <label>RAM (GB)</label>
            <input type="number" name="ram" required>
        </div>

        <div class="form-group">
            <label>Weight (kg)</label>
            <input type="number" step="any" name="weight" required>
        </div>

        <button type="submit" class="btn">Predict</button>
    </form>

    {% if results %}
        <div class="result">
            <h2>💰 Predicted Price: €{{ results }}</h2>
        </div>
    {% endif %}

    <a href="{{ url_for('index') }}">
        <button class="btn secondary">⬅ Back</button>
    </a>
</div>

</body>
</html>
